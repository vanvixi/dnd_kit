name: dnd_kit_workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - packages/dnd_kit
  - packages/dnd_kit_flutter
  - packages/dnd_kit_jaspr
  - examples/kanban_board
  - examples/basic_drag_drop
  - examples/multi_container_sortable
  - examples/example_gallery
  - examples/jaspr_example_gallery
  - website

dev_dependencies:
  lints: ^5.0.0
  melos: ^7.8.1

melos:
  scripts:
    analyze:
      run: dart run melos exec --concurrency 1 -- "dart analyze"
    analyze:affected:
      run: dart run tool/affected_validate.dart analyze
    test:
      run: dart run melos exec --dir-exists test -- "dart test"
    test:affected:
      run: dart run tool/affected_validate.dart test
    validate:full:
      run: |
        set -e
        dart format --output=none --set-exit-if-changed .
        dart run melos run analyze
        dart test packages/dnd_kit
        dart test packages/dnd_kit_jaspr
        flutter test packages/dnd_kit_flutter
        flutter test examples/kanban_board
        flutter test examples/multi_container_sortable
        flutter test examples/example_gallery
    validate:
      run: dart run melos run validate:full
    validate:affected:
      run: dart run tool/affected_validate.dart validate
