name: dnd_kit_website
description: Marketing home page for the dnd_kit drag-and-drop family, built with Jaspr.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  dnd_kit_jaspr:
    path: ../packages/dnd_kit_jaspr
  jaspr: ^0.23.1
  jaspr_router: ^0.8.2
  universal_web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
