name: flutter_example_gallery
description: Flutter feature gallery for the dnd_kit drag-and-drop demo catalog.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  dnd_kit_flutter:
    path: ../../packages/dnd_kit_flutter
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
