name: jaspr_basic_drag_drop
description: Minimal runnable Jaspr example for the dnd_kit_jaspr drag-and-drop API.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  dnd_kit_jaspr:
    path: ../../packages/dnd_kit_jaspr
  jaspr: ^0.23.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: client
